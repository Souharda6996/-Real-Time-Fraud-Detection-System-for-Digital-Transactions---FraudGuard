name: CI — FraudGuard

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Build, Lint & Test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Run unit tests
        run: npm test -- --ci --coverage --passWithNoTests
        env:
          # Provide stub env vars so imports that reference process.env don't throw
          NEXTAUTH_SECRET: ci-test-secret-not-real
          NEXTAUTH_URL: http://localhost:3000
          SERVER_PEPPER: ci-test-pepper-not-real
          WEBHOOK_HMAC_SECRET: ci-test-hmac-not-real

      - name: Build (production bundle)
        run: npm run build
        env:
          # Disable Prisma generate in CI (no real DB)
          SKIP_ENV_VALIDATION: true
          NEXTAUTH_SECRET: ci-test-secret-not-real
          NEXTAUTH_URL: http://localhost:3000
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci

      - name: Check bundle size
        run: |
          if [ -d ".next" ]; then
            echo "Build artifacts:"
            du -sh .next/static/chunks/*.js 2>/dev/null | sort -hr | head -20 || true
          fi
